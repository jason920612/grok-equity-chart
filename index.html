<!doctype html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Equity</title>
<script src="tradview.min.js"></script><!-- vendored v1.0.1, served gzip by GitHub Pages -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
  html,body{margin:0;height:100%;background:#0b0e11;color:#cdd;font-family:system-ui,sans-serif}
  #app{position:absolute;inset:0;display:flex;flex-direction:column;min-height:0}
  #err{position:absolute;top:8px;left:8px;right:8px;z-index:9;color:#ef5350;font-size:13px}
  #mkt{position:absolute;top:52px;left:50%;transform:translateX(-50%);display:none;z-index:8;
       background:#1c2127;color:#e6c878;border:1px solid #3a4350;padding:5px 14px;border-radius:6px;
       font-size:13px;font-weight:600;white-space:nowrap;pointer-events:none;box-shadow:0 2px 8px rgba(0,0,0,.4)}
  #stats{position:absolute;top:52px;right:10px;z-index:8;display:none;background:rgba(28,33,39,.85);
       color:#cdd;padding:4px 10px;border-radius:6px;font-size:13px;white-space:nowrap;
       pointer-events:none;font-variant-numeric:tabular-nums}
  .tv-topbar{padding-left:16px!important}  /* stopgap: first interval button clipped at left edge */
</style></head><body>
<div id="app"></div><div id="err"></div><div id="mkt"></div><div id="stats"></div>
<script>
// ======== Firebase web config (public-safe; access gated by RTDB rules) ========
const firebaseConfig={
  apiKey:"AIzaSyAe_LOmLnE0nfzqhjNuibjDlh54ueSF4a4",
  authDomain:"grok-equity.firebaseapp.com",
  databaseURL:"https://grok-equity-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"grok-equity"};
// ================================================================================

const MS={"1s":1000,"5s":5000,"15s":15000,"1m":60000,"5m":300000,"15m":900000,"1h":3600000};
// 1s/5s/15s -> c1s (2h) | 1m/5m/15m -> c1m (30d) | 1h -> c1h (120d)
function seriesOf(iv){return MS[iv]<60000?"c1s":(MS[iv]<3600000?"c1m":"c1h");}

// TradView DataProvider backed by Firebase RTDB. getHistory aggregates the right
// base series to the requested interval; subscribe drives the live bar off /equity/live.
function firebaseProvider(fdb){
  const cache={}, subs={}; let n=0;
  function loadSeries(s){
    if(cache[s])return Promise.resolve(cache[s]);
    return fdb.ref("/equity/"+s).once("value").then(snap=>{
      const val=snap.val()||{}, m=new Map(); let maxTs=0;
      for(const ts in val){const k=+ts; m.set(k,val[ts]); if(k>maxTs)maxTs=k;}
      cache[s]=m;
      fdb.ref("/equity/"+s).orderByKey().startAt(String(maxTs+1)).on("child_added",sn=>m.set(+sn.key,sn.val()));
      return m;
    });
  }
  function aggregate(series,ivMs){
    const ks=[...series.keys()].sort((a,b)=>a-b), out=new Map();
    for(const ts of ks){const k=series.get(ts), b=Math.floor(ts*1000/ivMs)*ivMs, cell=out.get(b);
      if(!cell)out.set(b,{t:b,o:k.o,h:k.h,l:k.l,c:k.c});
      else{cell.h=Math.max(cell.h,k.h);cell.l=Math.min(cell.l,k.l);cell.c=k.c;}}
    return [...out.values()];
  }
  return {
    getCapabilities(){return Promise.resolve({historyModes:["loadMore","range","cursor"],realtimeModes:["bar"]});},
    getHistory(q){
      const ivMs=MS[q.interval]; if(!ivMs)return Promise.resolve({bars:[],hasMore:false});
      return loadSeries(seriesOf(q.interval)).then(series=>{
        let bars=aggregate(series,ivMs);
        if(q.mode==="loadMore"&&q.endTime)bars=bars.filter(b=>b.t<q.endTime);
        else if(q.mode==="range")bars=bars.filter(b=>b.t>=q.from&&b.t<=q.to);
        if(q.limit&&bars.length>q.limit)bars=bars.slice(bars.length-q.limit);
        return {bars,hasMore:false};
      });
    },
    subscribe(params,h){
      const id="s"+(++n), ivMs=MS[params.interval]||1000; let cur=null;
      const ref=fdb.ref("/equity/live");
      const cb=ref.on("value",snap=>{const m=snap.val(); if(!m)return; const v=m.v,t=m.t*1000,b=Math.floor(t/ivMs)*ivMs;
        if(!cur||b>cur.t){if(cur)h.onBar&&h.onBar(cur,{partial:false,subscriptionId:id});cur={t:b,o:v,h:v,l:v,c:v};}
        else{cur.h=Math.max(cur.h,v);cur.l=Math.min(cur.l,v);cur.c=v;}
        h.onBar&&h.onBar(cur,{partial:true,subscriptionId:id});});
      subs[id]={ref,cb};
      h.onConnectionChange&&h.onConnectionChange("connected");
      return Promise.resolve({id,clientRef:id,symbol:params.symbol,interval:params.interval,
        channels:["bar"],streamMode:"bar"});
    },
    unsubscribe(id){if(subs[id]){try{subs[id].ref.off("value",subs[id].cb);}catch(e){}delete subs[id];}return Promise.resolve();},
    invalidate(){for(const s in cache){try{fdb.ref("/equity/"+s).off();}catch(e){}delete cache[s];}}  // drop stale cache on resume
  };
}

// --- FX market-closed banner (computed client-side, mirrors settings.py) ---
function fxClosed(d){const mo=d.getUTCMonth()+1,day=d.getUTCDate();
  if((mo===12&&day===25)||(mo===1&&day===1))return true;
  const wd=d.getUTCDay(),h=d.getUTCHours();
  if(wd===5&&h>=21)return true; if(wd===6)return true; if(wd===0&&h<22)return true; return false;}
function fxReason(d){const mo=d.getUTCMonth()+1,day=d.getUTCDate();
  if(mo===12&&day===25)return"耶誕節休市"; if(mo===1&&day===1)return"元旦休市"; return"外匯休市";}
function fxNextOpen(d){let t=new Date(Date.UTC(d.getUTCFullYear(),d.getUTCMonth(),d.getUTCDate(),d.getUTCHours()+1,0,0,0));
  for(let i=0;i<24*9;i++){if(!fxClosed(t))return t.getTime(); t=new Date(t.getTime()+3600000);} return null;}
function fmtDur(s){s=Math.max(0,Math.floor(s));const d=Math.floor(s/86400);s-=d*86400;
  const h=Math.floor(s/3600);s-=h*3600;const m=Math.floor(s/60),ss=s%60;
  return d>0?(d+"d "+h+"h "+m+"m"):(h>0?(h+"h "+m+"m"):(m+"m "+ss+"s"));}
const mktEl=document.getElementById("mkt");
setInterval(()=>{const now=new Date(); if(!fxClosed(now)){mktEl.style.display="none";return;}
  const no=fxNextOpen(now); let t="🔒 "+fxReason(now);
  if(no)t+=" · "+fmtDur((no-now.getTime())/1000)+"後開市";
  mktEl.textContent=t; mktEl.style.display="block";},500);

try{
  firebase.initializeApp(firebaseConfig);
  const fdb=firebase.database();
  const provider=firebaseProvider(fdb);
  const chartRef={current:null};
  const layout=TradView.mountChartLayout(document.getElementById("app"),{
    showTopBar:true,showLeftToolbar:true,showBottomToolbar:true,
    showCrosshairLegend:true,showStatusBar:true,showContextMenu:true,
    intervals:["1s","5s","15s","1m","5m","15m","1h"],
    activeInterval:"5s",activeDrawingTool:"cursor",
    onIntervalChange:(iv)=>chartRef.current&&chartRef.current.setInterval(iv),
    onDrawingToolSelect:(tool)=>chartRef.current&&chartRef.current.setDrawingTool(tool),
    onDrawingStyleChange:(patch)=>chartRef.current&&chartRef.current.updateSelectedDrawingStyle(patch)});
  const chart=TradView.createChart(layout.chartHost,{
    dataProvider:provider, interval:"5s", theme:"dark",
    indicatorHost:layout.indicatorHost,
    features:{drawings:{layer:true,persist:true},smoothPriceUpdate:true,smoothPriceDurationMs:150}});
  chartRef.current=chart;
  chart.setSymbol("EQUITY");
  window.addEventListener("resize",()=>chart.resize());
  // After a real background gap, drop the stale Firebase cache + reloadHistory()
  // so missed candles fill back in while keeping the user's scroll/zoom.
  let _hid=0;
  document.addEventListener("visibilitychange",()=>{
    if(document.visibilityState==="hidden")_hid=Date.now();
    else if(Date.now()-_hid>1500&&chartRef.current){provider.invalidate&&provider.invalidate();chartRef.current.reloadHistory();}
  });
  // current equity + 24h change readout (top-right)
  const statsEl=document.getElementById("stats");
  let _eq=null,_ref24=null;
  function renderStats(){if(_eq==null){statsEl.style.display="none";return;}
    let h="淨值 "+_eq.toFixed(2);
    if(_ref24!=null){const chg=_eq-_ref24,up=chg>=0,col=up?"#26a69a":"#ef5350",sg=up?"+":"";
      h+=" · <span style='color:"+col+"'>24h "+sg+chg.toFixed(2)+" ("+sg+(chg/_ref24*100).toFixed(2)+"%)</span>";}
    statsEl.innerHTML=h; statsEl.style.display="block";}
  fdb.ref("/equity/live").on("value",s=>{const m=s.val(); if(m){_eq=m.v; renderStats();}});
  function loadRef24(){const cut=Math.floor(Date.now()/1000-86400);
    fdb.ref("/equity/c1h").orderByKey().endAt(String(cut)).limitToLast(1).once("value")
      .then(s=>{const v=s.val(); if(v){const k=Object.keys(v)[0]; _ref24=v[k].c; renderStats();}}).catch(e=>{});}
  loadRef24(); setInterval(loadRef24,300000);
}catch(e){document.getElementById("err").textContent="init error: "+(e&&e.message||e);}
</script></body></html>
